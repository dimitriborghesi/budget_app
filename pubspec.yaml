name: budget_app
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+9

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  intl: ^0.20.2
  fl_chart: ^1.2.0
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  local_auth: ^2.1.6  
  uuid: ^4.5.3
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: 16.1.3
  flutter_local_notifications: ^17.0.0
  flutter_slidable: ^3.1.0
  vibration: ^3.1.8
  url_launcher: ^6.3.2
  in_app_purchase: ^3.1.13
  shared_preferences: ^2.2.2
  pdf: ^3.12.0
  share_plus: ^7.2.1
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/background.png
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600