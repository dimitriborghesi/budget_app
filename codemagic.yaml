workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: 4SZAB6635B
        APP_STORE_CONNECT_ISSUER_ID: afeb26af-25c9-4075-bcfa-d664c3c60cf0

      files:
        - appstore_key.p8

    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app

    publishing:
      app_store_connect:
        key_identifier: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        private_key: $CM_KEYSTORE
        submit_to_testflight: true